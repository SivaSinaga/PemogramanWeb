<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <title>tugas3</title>

  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background:url("main-bg.png") ;
      display: flex;
      justify-content: center;
      align-items: center;

  
    }

    .uu {
      color: teal;
    }

    .container {
      width: 400px;
    }

    .card {
      background: #7986ff;
      padding: 20px;
      border-radius: 15px;
      text-align: center;
      color: white;
      box-shadow: 0 10px 20px rgba(0,0,0,0.3);
    }

    .profile {
      width: 100px;
      height: 90px;
      border-radius: 50%;
      object-fit: cover;
    }

    .desc {
      font-size: 14px;
      color: #ccc;
    }

    .buttons a {
      display: block;
      background: #5b6cff;
      margin: 10px 0;
      padding: 10px;
      border-radius: 8px;
      text-decoration: none;
      color: white;
      transition: 0.3s;
    }

    .buttons a:hover {
      background: #7986ff;
    }

    .connect {
      background: #ff4d5a !important;
    }

    .section {
      margin-top: 20px;
    }

    .video {
      width: 70%;
      border-radius: 10px;
      margin: 10px 0;
    }
  </style>

</head>
<body>

<div class="container">
  <div class="card">

    <!-- GANTI sesuai nama file -->
    <img src="wendy.jpg" alt="Profile" class="profile">

    <h2>Wendyss</h2>
    <p class="desc">Suka Nyanyi | Makan | Koleksi dosa</p>

    <div class="buttons">
      <a href="https://github.com/SivaSinaga" target="_blank">GitHub</a>
      <a href="https://www.linkedin.com/in/siva-undefined-328128338/" target="_blank">LinkedIn</a>
      <a href="https://www.instagram.com/sivasinaga" target="_blank">Instagram</a>
      <a href="#" class="connect">Connect Yuk</a>
    </div>

    <div class="section">
      <h3> SEPERTI AIR</h3>
      <img src="video.jpg" class="video">
      <p class="uu">Jadilah seperti air tenang, bening, diam, diam-diam cumlaude</p>
      <small>hiya</small>
    </div>

  </div>
</div>

</body>
</html>
